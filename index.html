<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legion Erzherzog Karl — Campaign Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#EAE0C8;
  --parchment-dark:#D8C8A2;
  --ink:#221C13;
  --ink-soft:#4a4030;
  --gold:#B08A2E;
  --gold-bright:#C9A227;
  --oxblood:#6E2A26;
  --field-green:#4B5D3A;
  --rule:#3a3221;
  --accent:#B08A2E;
  --accent2:#B08A2E;
  --accent-soft:rgba(176,138,46,0.10);
}
.theme-musketeers{ --accent:#8B5A2B; --accent2:#8B5A2B; --accent-soft:rgba(139,90,43,0.10); }
.theme-strelci{ --accent:#B9932A; --accent2:#B9932A; --accent-soft:rgba(185,147,42,0.12); }
.theme-legion{ --accent:#5A4E74; --accent2:#7A2426; --accent-soft:rgba(90,78,116,0.10); }

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top left, rgba(255,255,255,0.08), transparent 60%),
    var(--parchment);
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px),
    var(--parchment);
  color:var(--ink);
  font-family:'Source Serif 4', Georgia, serif;
  min-height:100vh;
  padding:0 0 60px 0;
}

.masthead{
  border-bottom:4px double var(--rule);
  padding:34px 24px 22px;
  text-align:center;
  position:relative;
  background:linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
}
.seal{
  width:64px;height:64px;
  margin:0 auto 14px;
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  background:radial-gradient(circle at 35% 30%, rgba(201,162,39,0.25), transparent 70%);
}
.seal::before{
  content:'';
  position:absolute;
  inset:6px;
  border:1px solid var(--gold);
  border-radius:50%;
}
.seal-mark{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:20px;
  color:var(--gold);
  letter-spacing:1px;
}
.masthead h1{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(24px,4vw,40px);
  letter-spacing:2px;
  margin:0 0 8px;
  text-transform:uppercase;
  color:var(--ink);
}
.masthead .subtitle{
  font-family:'Cinzel',serif;
  font-weight:500;
  font-size:14px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--oxblood);
}
.masthead .dateline{
  margin-top:10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:1px;
  color:var(--ink-soft);
  text-transform:uppercase;
}

.nav-wrap{
  border-bottom:2px solid var(--rule);
  background:rgba(255,255,255,0.12);
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(2px);
}
.nav{
  max-width:1200px;
  margin:0 auto;
  display:flex;
  flex-wrap:nowrap;
  justify-content:center;
  align-items:center;
  gap:clamp(2px,0.6vw,10px);
  padding:0 10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{ display:none; }
.nav button{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:clamp(8.5px,1.15vw,12px);
  letter-spacing:.5px;
  text-transform:uppercase;
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  padding:clamp(11px,1.7vw,16px) clamp(4px,1vw,10px);
  color:var(--ink-soft);
  cursor:pointer;
  white-space:nowrap;
  transition:color .15s, border-color .15s;
  flex:0 0 auto;
}
.nav button:hover{ color:var(--ink); background:rgba(0,0,0,0.03); }
.nav button.active{
  color:var(--ink);
  font-weight:700;
  background:rgba(0,0,0,0.045);
  border-bottom-color:var(--tab-accent, var(--gold-bright));
}
main{max-width:1080px;margin:0 auto;padding:32px 20px 0;}
.panel{display:none;}
.panel.active{display:block; animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);}}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  border-bottom:2px solid var(--rule);
  padding-bottom:10px;
  margin-bottom:22px;
}
.panel-header .titles{display:flex; align-items:center; gap:14px;}
.crest-slot{
  width:42px;height:42px;
  border:1.5px solid var(--accent);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:15px;
  color:var(--accent);
  background:var(--accent-soft);
  flex-shrink:0;
}
.panel-header h2{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:22px;
  letter-spacing:1.5px;
  margin:0;
  text-transform:uppercase;
}
.panel-header .gloss{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--accent2);
  margin-top:2px;
}
.panel-header .meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  letter-spacing:.5px;
}

.stat-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:1px;
  background:var(--rule);
  border:1px solid var(--rule);
  margin-bottom:28px;
}
.stat-cell{
  background:var(--parchment);
  padding:16px 14px;
  text-align:center;
}
.stat-cell .num{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:26px;
  color:var(--ink);
  display:block;
}
.stat-cell.kills .num{color:var(--field-green);}
.stat-cell.deaths .num{color:var(--oxblood);}
.stat-cell.accent .num{color:var(--accent);}
.stat-cell .lbl{
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-soft);
  display:block;
  margin-top:4px;
}

.ledger-wrap{
  border-top:3px double var(--rule);
  border-bottom:3px double var(--rule);
  margin-bottom:32px;
}
table.ledger{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
table.ledger thead th{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  text-align:left;
  padding:10px 12px;
  border-bottom:1px solid var(--rule);
  color:var(--ink-soft);
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
}
table.ledger thead th:hover{color:var(--ink);}
table.ledger thead th.sorted{color:var(--accent);}
table.ledger thead th.sorted::after{ content:' ▾'; }
table.ledger thead th.num, table.ledger td.num{text-align:right;}
table.ledger tbody tr{border-bottom:1px solid rgba(58,50,33,0.18);}
table.ledger tbody tr:hover{background:var(--accent-soft);}
table.ledger td{padding:8px 12px; font-family:'IBM Plex Mono',monospace; font-size:13px;}
table.ledger td.name-cell{font-family:'Source Serif 4',serif; font-size:14px; font-weight:600;}
.rank-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  width:24px;
  display:inline-block;
}
.pos-tag{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:.5px;
  border:1px solid var(--rule);
  padding:1px 5px;
  color:var(--ink-soft);
  text-transform:uppercase;
}
.staff-tag{ border-color:var(--accent); color:var(--accent); }
.kdr-good{color:var(--field-green); font-weight:600;}
.kdr-bad{color:var(--oxblood);}

.platoon-block{margin-bottom:36px;}
.platoon-title{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:15px;
  letter-spacing:.5px;
  margin:0 0 10px;
  padding:6px 0 6px 12px;
  border-left:4px solid var(--accent);
  background:var(--accent-soft);
}
.theme-legion .platoon-title{
  border-left:4px solid;
  border-image:linear-gradient(180deg, var(--accent), var(--accent2)) 1;
}

.placeholder{
  border:1px dashed var(--rule);
  padding:60px 30px;
  text-align:center;
  color:var(--ink-soft);
}
.placeholder .seal-mark-lg{
  font-family:'Cinzel',serif;
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--accent);
  display:block;
  margin-bottom:12px;
}
.placeholder p{max-width:440px;margin:8px auto 0;font-size:14px;line-height:1.6;}

/* ===== BATTLE RESULTS ===== */
.battle-card{
  border:1px solid var(--rule);
  background:rgba(255,255,255,0.10);
  margin-bottom:32px;
}
.battle-head{
  padding:22px 22px 18px;
  border-bottom:none;
  text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,0.14), transparent);
}
.battle-head .battle-name{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:16px;
}
.corps-flags-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}
.flag-box{
  flex-shrink:0;
  width:44px;
  height:29px;
  border:1px solid var(--rule);
  box-shadow:1px 1px 0 rgba(0,0,0,0.15);
  overflow:hidden;
}
.flag-box svg{ display:block; width:100%; height:100%; }
.corps-big{
  font-family:'Cinzel',serif;
  font-weight:800;
  font-size:clamp(18px,3.6vw,28px);
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--ink);
  line-height:1.2;
}
.corps-big .vs-mini{
  display:inline-block;
  font-size:0.5em;
  color:var(--ink-soft);
  letter-spacing:2px;
  margin:0 10px;
  vertical-align:middle;
}
.battle-head .battle-date{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:10px;
  letter-spacing:.5px;
}
.result-summary{
  text-align:center;
  padding:14px 20px 22px;
  border-bottom:3px double var(--rule);
}
.result-summary .outcome-text{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(22px,4vw,32px);
  letter-spacing:3px;
  text-transform:uppercase;
}
.result-summary .outcome-text.win{color:var(--field-green);}
.result-summary .outcome-text.loss{color:var(--oxblood);}
.result-summary .diff-num{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:15px;
  display:block;
  margin-top:4px;
  color:var(--ink-soft);
}
.result-summary .diff-num.diff-pos{color:var(--field-green);}
.result-summary .diff-num.diff-neg{color:var(--oxblood);}

.matchups-wrap{padding:6px 0;}
.matchup-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
  padding:16px 16px;
  border-bottom:1px solid rgba(58,50,33,0.18);
}
.matchup-row:last-child{border-bottom:none;}
.m-our, .m-their{
  display:flex;
  align-items:baseline;
  gap:16px;
}
.m-our{ justify-content:flex-end; }
.m-their{ justify-content:flex-start; }
.m-nameblock{ text-align:right; }
.m-their .m-nameblock{ text-align:left; }
.m-nameblock .m-name{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:17px;
  letter-spacing:.3px;
  text-transform:uppercase;
  color:var(--ink);
}
.m-nameblock .m-men{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--ink-soft);
  letter-spacing:.5px;
  margin-top:2px;
}
.m-starcluster{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  width:38px;
  flex-shrink:0;
}
.m-starcluster svg{ display:block; color:var(--gold-bright); }
.m-starcluster .star-count{
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:14px;
  color:var(--ink-soft);
  line-height:1;
}
.m-points{
  font-family:'IBM Plex Mono',monospace;
  font-weight:800;
  font-size:32px;
  line-height:1;
  min-width:52px;
}
.m-our .m-points{ text-align:left; }
.m-their .m-points{ text-align:right; }
.m-points.diff-pos{color:var(--field-green);}
.m-points.diff-neg{color:var(--oxblood);}
.m-points.diff-tie{color:var(--ink-soft);}
.m-divider{
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:2px;
  color:var(--ink-soft);
  text-transform:uppercase;
}
.line-chip{
  display:inline-block;
  width:9px;height:9px;
  border-radius:2px;
  margin-right:7px;
  vertical-align:middle;
}

.name-link{
  cursor:pointer;
  border-bottom:1px dotted var(--ink-soft);
  transition:color .15s;
}
.name-link:hover{ color:var(--accent, var(--gold)); border-bottom-color:var(--accent, var(--gold)); }

/* ===== PROFILE ===== */
.profile-empty{
  border:1px dashed var(--rule);
  padding:50px 30px;
  text-align:center;
  color:var(--ink-soft);
}
.profile-empty input{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  padding:8px 12px;
  border:1px solid var(--rule);
  background:var(--parchment);
  color:var(--ink);
  width:240px;
  max-width:80%;
  margin-top:14px;
}
.profile-card{
  border:1px solid var(--rule);
  background:rgba(255,255,255,0.10);
}
.profile-head{
  padding:26px 22px 22px;
  text-align:center;
  border-bottom:2px double var(--rule);
  background:linear-gradient(180deg, rgba(255,255,255,0.14), transparent);
  position:relative;
}
.back-btn{
  position:absolute;
  left:14px;
  top:14px;
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  background:none;
  border:1px solid var(--rule);
  color:var(--ink-soft);
  padding:6px 10px;
  cursor:pointer;
}
.back-btn:hover{ color:var(--ink); border-color:var(--ink); }
.profile-head .p-name{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(22px,4vw,32px);
  letter-spacing:1px;
  text-transform:uppercase;
}
.profile-head .p-rank{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:1px;
  color:var(--accent2);
  margin-top:6px;
  text-transform:uppercase;
}
.profile-head .p-unit{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:4px;
}
.profile-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:1px;
  background:var(--rule);
  border-bottom:1px solid var(--rule);
}
.profile-stats .stat-cell{padding:18px 10px;}
.profile-stats .rank-sub{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;
  letter-spacing:.5px;
  color:var(--accent);
  margin-top:4px;
  opacity:.85;
}
.promotion-block{padding:22px;}
.promotion-block h4{
  font-family:'Cinzel',serif;
  font-size:13px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin:0 0 14px;
  color:var(--ink-soft);
  border-bottom:1px solid var(--rule);
  padding-bottom:8px;
}
.promo-status{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  border:1px solid var(--rule);
  margin-bottom:12px;
}
.promo-status.due{ border-color:var(--field-green); background:rgba(75,93,58,0.08); }
.promo-status.na{ border-color:var(--rule); background:rgba(0,0,0,0.03); }
.promo-badge{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:5px 10px;
  border:1px solid var(--ink-soft);
  color:var(--ink-soft);
  white-space:nowrap;
}
.promo-status.due .promo-badge{ border-color:var(--field-green); color:var(--field-green); }
.promo-text{font-family:'Source Serif 4',serif; font-size:14px; line-height:1.5;}
.promo-text b{font-weight:700;}
.progress-bar{
  height:8px;
  background:rgba(0,0,0,0.08);
  border:1px solid var(--rule);
  margin-top:6px;
  overflow:hidden;
}
.progress-bar-fill{ height:100%; background:var(--accent); }
.progress-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  color:var(--ink-soft);
  margin-top:6px;
}

/* ===== HIGH COMMAND ===== */
.command-group{margin-bottom:32px;}
.command-group-title{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin:0 0 10px;
  padding:6px 0 6px 12px;
  border-left:4px solid var(--gold-bright);
  background:rgba(176,138,46,0.06);
}
.command-group.tinted .command-group-title{ border-left-color:var(--accent); background:var(--accent-soft); }

/* ===== RECOMMENDATIONS ===== */
.rec-section{margin-bottom:38px;}
.rec-section-title{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:16px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin:0 0 4px;
}
.rec-section-desc{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-bottom:14px;
}
.rec-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
.rec-card{
  border:1px solid var(--rule);
  background:rgba(255,255,255,0.10);
  padding:14px 16px;
}
.rec-card .rc-name{
  font-family:'Source Serif 4',serif;
  font-weight:700;
  font-size:15px;
}
.rec-card .rc-meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:4px;
}
.rec-card .rc-highlight{
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:20px;
  color:var(--accent, var(--gold-bright));
  margin-top:8px;
}
.rec-card .rc-tag{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  border:1px solid var(--rule);
  padding:2px 6px;
  color:var(--ink-soft);
  margin-top:8px;
}
.rec-empty{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  padding:16px;
  border:1px dashed var(--rule);
  text-align:center;
}
.sample-tag{
  display:inline-block;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--ink-soft);
  border:1px dashed var(--rule);
  padding:2px 7px;
  margin-bottom:16px;
}

footer{
  max-width:1080px;
  margin:40px auto 0;
  padding:16px 20px 0;
  border-top:1px solid var(--rule);
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  color:var(--ink-soft);
  text-align:center;
  text-transform:uppercase;
}

@media (max-width:640px){
  table.ledger{font-size:12px;}
  table.ledger td, table.ledger thead th{padding:7px 8px;}
}
</style>
<style>
#loading-screen{
  position:fixed; inset:0; background:var(--parchment); z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#loading-screen .seal{ margin-bottom:0; }
#loading-screen .loading-text{
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft);
}
#load-error{

const THEME_BY_ID = {
  musketyri:'theme-musketeers',
  strelci:'theme-strelci',
  legion:'theme-legion'
};

/* ============ FILTER RULE ============
   Musketeers (younger company, roster turns over fast): show a member only if
   they logged activity this week (any day TRUE), OR they hold a command/staff
   role (PCO, PXO, NCO, CCO, CXO) — command roles always stay listed.
   Strelci & Legionáři (veteran companies, roster barely changes): show everyone. */
function visibleMembers(members, company){
  if(company.filter === 'all') return members;
  return members.filter(m => m.active_this_week || m.is_staff);
}

/* ============ UTILITIES ============ */
function flattenVisible(){
  const rows = [];
  COMPANIES.forEach(c=>{
    c.platoons.forEach(p=>{
      visibleMembers(p.members, c).forEach(m=>{
        rows.push({...m, company:c.label, platoon:p.name});
      });
    });
  });
  return rows;
}
function fmtPct(v){return v + '%';}
function kdrClass(kdr){
  if(kdr > 1) return 'kdr-good';
  if(kdr > 0 && kdr <= 0.5) return 'kdr-bad';
  return '';
}

/* ============ PROMOTION LADDER ============
   Trooper progression track, based on battles attended (events).
   Honorary ranks are gated by company tier (veterancy):
   tier 0 = Musketeers, tier 1 = Strelci+, tier 2 = Legionáři only.
   Appointed ranks (Korporal, Vize-Feldwebel, Feldwebel, Fähnrich and above)
   sit outside this ladder — they're earned by appointment, not battle count. */
const COMPANY_TIER = { musketyri:0, strelci:1, legion:2 };
const RANK_LADDER = [
  {name:'Landwehr', threshold:0, tier:0},
  {name:'Gemeiner', threshold:1, tier:0},
  {name:'Gefreiter', threshold:8, tier:0},
  {name:'Fourierschütz', threshold:19, tier:0},
  {name:'Vize-Korporal', threshold:38, tier:0},
  {name:'Honorary Korporal', threshold:62, tier:1},
  {name:'Honorary Vize-Feldwebel', threshold:105, tier:2},
];

function ladderIndex(rankName){
  if(!rankName) return -1;
  return RANK_LADDER.findIndex(r => r.name.toLowerCase() === rankName.trim().toLowerCase());
}
function eligibleLadderIndex(events, tier){
  let idx = 0;
  RANK_LADDER.forEach((r,i)=>{ if(events >= r.threshold && tier >= r.tier) idx = i; });
  return idx;
}
function promotionStatus(member, companyId){
  const tier = COMPANY_TIER[companyId] ?? 0;
  const curIdx = ladderIndex(member.rank);
  if(curIdx === -1){
    return {onLadder:false};
  }
  const eligIdx = eligibleLadderIndex(member.events, tier);
  const dueForPromotion = eligIdx > curIdx;
  const nextIdx = curIdx + 1;
  const nextRank = nextIdx < RANK_LADDER.length ? RANK_LADDER[nextIdx] : null;
  const nextAvailable = nextRank && tier >= nextRank.tier;
  return {
    onLadder:true,
    dueForPromotion,
    recommendedRank: RANK_LADDER[eligIdx].name,
    nextRank: nextRank ? nextRank.name : null,
    nextThreshold: nextRank ? nextRank.threshold : null,
    nextAvailable,
    battlesToNext: nextRank ? Math.max(0, nextRank.threshold - member.events) : null,
  };
}

        </thead>
        <tbody></tbody>
      </table>
    </div>
  `;
  document.getElementById('main').appendChild(panel);

  let sortKey='kills', sortDir=-1;
  function draw(){
    const sorted = [...rows].sort((a,b)=>{
      if(sortKey==='name'||sortKey==='company') return sortDir==1 ? a[sortKey].localeCompare(b[sortKey]) : b[sortKey].localeCompare(a[sortKey]);
      return sortDir==1 ? a[sortKey]-b[sortKey] : b[sortKey]-a[sortKey];
    });
    const tbody = panel.querySelector('tbody');
    tbody.innerHTML = sorted.map((m,i)=>`
      <tr>
        <td class="rank-badge">${i+1}</td>
        <td class="name-cell">${nameLink(m.name)}<br><span class="pos-tag ${m.is_staff?'staff-tag':''}">${m.rank||'—'}</span></td>

      if(key==='rankpos') return;
      if(sortKey===key){ sortDir *= -1; } else { sortKey=key; sortDir = (key==='name'||key==='company') ? 1 : -1; }
      panel.querySelectorAll('thead th').forEach(x=>x.classList.remove('sorted'));
      th.classList.add('sorted');
      draw();
    });
  });
  draw();
}

/* Draws a small 5-point star polygon centered at (cx,cy) with given outer radius */
function starGlyphPoints(cx, cy, rOuter, rotationOffset){
  const rInner = rOuter * 0.42;
  const pts = [];
  for(let i=0;i<10;i++){
    const r = i%2===0 ? rOuter : rInner;
    const a = rotationOffset + i*Math.PI/5;
    pts.push(`${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`);
  }
  return pts.join(' ');
}
/* Arranges N tiny stars at the vertices of a regular N-gon (square for 4, pentagon for 5, etc.)
   instead of a row, so the whole rating sits in one compact cluster. */
function starCluster(count){
  const n = Math.max(0, Math.min(8, count));
  const size = 32, cx = size/2, cy = size/2;
  let glyphs = '';
  if(n <= 0){
    glyphs = '';
  } else if(n === 1){
    glyphs = `<polygon points="${starGlyphPoints(cx,cy,size*0.24,-Math.PI/2)}" fill="currentColor"/>`;
  } else {
    const r = size*0.34;
    for(let i=0;i<n;i++){
      const angle = -Math.PI/2 + i*(2*Math.PI/n);
      const px = cx + r*Math.cos(angle);
      const py = cy + r*Math.sin(angle);
      glyphs += `<polygon points="${starGlyphPoints(px,py,size*0.135,-Math.PI/2)}" fill="currentColor"/>`;
    }
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${glyphs}</svg>`;
}

function renderBattleCard(battle){
  const diffs = battle.matchups.map(m => m.ourPoints - m.theirPoints);
  const serverDiff = diffs.reduce((a,b)=>a+b,0);
  const won = serverDiff >= 0;

  const card = document.createElement('div');
  card.className = 'battle-card';
  card.innerHTML = `
    <div class="battle-head">
      <div class="battle-name">${battle.name}</div>
      <div class="corps-flags-row">
        <span class="flag-box">${flagSVG(battle.home)}</span>
        <span class="corps-big">${battle.homeCorps}<span class="vs-mini">vs</span>${battle.awayCorps}</span>
        <span class="flag-box">${flagSVG(battle.away)}</span>
      </div>
      <div class="battle-date">${battle.date}</div>
    </div>
    <div class="result-summary">
      <div class="outcome-text ${won?'win':'loss'}">${won ? 'Victory' : 'Defeat'}</div>
      <span class="diff-num ${serverDiff>=0?'diff-pos':'diff-neg'}">${serverDiff>=0?'+':''}${serverDiff} pts</span>
    </div>
    <div class="matchups-wrap">
      ${battle.matchups.map((m,i)=>{
        const d = diffs[i];
        const ourClass = d>0 ? 'diff-pos' : d<0 ? 'diff-neg' : 'diff-tie';
        const theirClass = d<0 ? 'diff-pos' : d>0 ? 'diff-neg' : 'diff-tie';
        const color = LINE_THEME_COLOR[m.theme] || '#B08A2E';
        return `
          <div class="matchup-row">
            <div class="m-our">
              <div class="m-nameblock">
                <div class="m-name"><span class="line-chip" style="background:${color};"></span>${m.ourLine}</div>
                <div class="m-men">${m.ourMen} men</div>
              </div>
              <div class="m-starcluster">${starCluster(m.ourStars)}<span class="star-count">${m.ourStars}</span></div>
              <div class="m-points ${ourClass}">${m.ourPoints}</div>
            </div>
            <div class="m-divider">vs</div>
            <div class="m-their">
              <div class="m-points ${theirClass}">${m.theirPoints}</div>
              <div class="m-starcluster">${starCluster(m.theirStars)}<span class="star-count">${m.theirStars}</span></div>
              <div class="m-nameblock">
                <div class="m-name">${m.theirLine}</div>
                <div class="m-men">${m.theirMen} men</div>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  return card;
}

function drawEmptyProfile(){
  const panel = document.getElementById('panel-profile');
  panel.className = panel.className.split(' ').filter(c=>!c.startsWith('theme-')).join(' ');
  panel.innerHTML = `
    <div class="panel-header"><h2>Service Record</h2></div>
    <div class="profile-empty">
      <span class="seal-mark-lg">No profile selected</span>
      <p>Click any name across the Individual or Company tabs to open their service record — or search by name below.</p>

    </div>
  `;
  const datalist = panel.querySelector('#profile-names');
  [...MEMBER_INDEX.keys()].sort().forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n;
    datalist.appendChild(opt);

function showProfile(name){
  const entry = MEMBER_INDEX.get(name);
  showTab('profile');
  const panel = document.getElementById('panel-profile');
  if(!entry){ drawEmptyProfile(); return; }
  const {member:m, company, platoon} = entry;
  const theme = THEME_BY_ID[company.id] || '';
  panel.className = 'panel active ' + theme;

  /* Rank this member against everyone else on record, stat by stat */
  const allStats = [...MEMBER_INDEX.values()].map(e=>e.member);
  const rankLabel = (value, pool) => {
    const clean = pool.filter(v=>typeof v === 'number' && !isNaN(v));
    const rank = clean.filter(v=>v>value).length + 1;
    return `#${rank} of ${clean.length}`;
  };
  const rcEntry = RECRUITMENT_INDEX.get(m.name);
  const rcPool = RECRUITMENT_ROSTER.map(r=>r.totalPoints);

  const promo = promotionStatus(m, company.id);
  let promoHtml;
  if(!promo.onLadder){
    promoHtml = `
      <div class="promo-status na">
        <span class="promo-badge">Appointed rank</span>
        <span class="promo-text">${m.rank} sits outside the standard battle-count ladder — it's an appointed NCO/officer rank, not something to auto-promote on events attended.</span>
      </div>
    `;
  } else if(promo.dueForPromotion){
    promoHtml = `
      <div class="promo-status due">
        <span class="promo-badge">Promotion due</span>
        <span class="promo-text">${m.events} battles attended qualifies <b>${m.name}</b> for <b>${promo.recommendedRank}</b> (currently ${m.rank}).</span>
      </div>
    `;
  } else if(promo.nextRank){
    const pct = promo.nextThreshold>0 ? Math.min(100, Math.round((m.events/promo.nextThreshold)*100)) : 100;
    promoHtml = `
      <div class="promo-status">
        <span class="promo-badge">On track</span>
        <span class="promo-text">Currently <b>${m.rank}</b>. ${
          promo.nextAvailable
            ? `Needs <b>${promo.battlesToNext}</b> more battle${promo.battlesToNext===1?'':'s'} for <b>${promo.nextRank}</b> (at ${promo.nextThreshold} battles).`
            : `Next rank <b>${promo.nextRank}</b> is only available in a higher-tier company (Strelci/Legionáři).`
        }</span>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
      <div class="progress-label">${m.events} / ${promo.nextThreshold} battles toward ${promo.nextRank}</div>
    `;
  } else {
    promoHtml = `
      <div class="promo-status due">
        <span class="promo-badge">Top of ladder</span>
        <span class="promo-text"><b>${m.name}</b> has reached the top of the standard promotion ladder.</span>
      </div>
    `;
  }

  panel.innerHTML = `
    <div class="profile-card">
      <div class="profile-head">
        <button class="back-btn" id="profile-back">&larr; Back to search</button>
        <div class="p-name">${m.name}</div>
        <div class="p-rank">${m.rank}${m.is_staff ? ' · '+m.position : ''}</div>
        <div class="p-unit">${company.label} (${company.gloss}) ${platoon && platoon !== company.full_name ? '· '+platoon : ''}</div>
      </div>
      <div class="profile-stats">
        <div class="stat-cell kills"><span class="num">${m.kills}</span><span class="lbl">Kills</span><span class="rank-sub">${rankLabel(m.kills, allStats.map(x=>x.kills))}</span></div>
        <div class="stat-cell deaths"><span class="num">${m.deaths}</span><span class="lbl">Deaths</span><span class="rank-sub">${rankLabel(m.deaths, allStats.map(x=>x.deaths))}</span></div>
        <div class="stat-cell accent"><span class="num">${m.kdr.toFixed(2)}</span><span class="lbl">KDR</span><span class="rank-sub">${rankLabel(m.kdr, allStats.map(x=>x.kdr))}</span></div>
        <div class="stat-cell accent"><span class="num">${m.kpe}</span><span class="lbl">KPE</span><span class="rank-sub">${rankLabel(m.kpe, allStats.map(x=>x.kpe))}</span></div>
        <div class="stat-cell"><span class="num">${m.events}</span><span class="lbl">Events</span><span class="rank-sub">${rankLabel(m.events, allStats.map(x=>x.events))}</span></div>
        <div class="stat-cell"><span class="num">${fmtPct(m.activity)}</span><span class="lbl">Activity</span><span class="rank-sub">${rankLabel(m.activity, allStats.map(x=>x.activity))}</span></div>
        ${rcEntry ? `<div class="stat-cell accent"><span class="num">${rcEntry.totalPoints}</span><span class="lbl">RC Points</span><span class="rank-sub">${rankLabel(rcEntry.totalPoints, rcPool)}</span></div>` : ''}
      </div>
      <div class="promotion-block">
        <h4>Promotion Status</h4>
        ${promoHtml}
      </div>
    </div>
  `;
  panel.querySelector('#profile-back').addEventListener('click', drawEmptyProfile);
}

/* ============ RENDER: RECOMMENDATIONS ============ */
function allRawMembers(){
  const rows = [];
  COMPANIES.forEach(c=>{
    c.platoons.forEach(p=>{
      p.members.forEach(m=>{
        rows.push({...m, companyId:c.id, companyLabel:c.label, platoon:p.name});
      });
    });
  });
  return rows;
}

function miniLedger(headerCells, rowsHtml){
  return `
    <div class="ledger-wrap">
      <table class="ledger">
        <thead><tr>${headerCells.map(h=>`<th${h.num?' class="num"':''}>${h.label}</th>`).join('')}</tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  `;
}

function renderRecommendationsPanel(){
  const all = allRawMembers();

  /* --- 1. Promotions due --- */
  const promoRows = all
    .map(m => ({m, promo: promotionStatus(m, m.companyId)}))
    .filter(x => x.promo.onLadder && x.promo.dueForPromotion);

  const promoHtml = promoRows.length ? miniLedger(
    [{label:'Name'},{label:'Company'},{label:'Current Rank'},{label:'Recommended'},{label:'Events',num:true}],
    promoRows.map(({m,promo})=>`
      <tr>
        <td class="name-cell">${nameLink(m.name)}</td>
        <td>${m.companyLabel}</td>
        <td>${m.rank}</td>
        <td class="kdr-good">${promo.recommendedRank}</td>
        <td class="num">${m.events}</td>
      </tr>
    `).join('')
  ) : `<div class="placeholder"><p>Nobody is currently overdue for promotion.</p></div>`;

  /* --- 2. Draft recommendations --- */
  const draftToStrelci = all.filter(m => m.companyId==='musketyri' && m.kpe >= 40);
  const draftToLegion  = all.filter(m => m.companyId==='strelci' && m.kpe >= 50);
  const draftRows = [
    ...draftToStrelci.map(m=>({...m, target:'STŘELCI'})),
    ...draftToLegion.map(m=>({...m, target:'LEGIONÁŘI'})),
  ].sort((a,b)=>b.kpe-a.kpe);

  const draftHtml = draftRows.length ? miniLedger(
    [{label:'Name'},{label:'Current Company'},{label:'KPE',num:true},{label:'Recommended Draft'}],
    draftRows.map(m=>`
      <tr>
        <td class="name-cell">${nameLink(m.name)}</td>
        <td>${m.companyLabel}</td>
        <td class="num kdr-good">${m.kpe}</td>
        <td>${m.target}</td>
      </tr>
    `).join('')
  ) : `<div class="placeholder"><p>No one currently clears the KPE bar for a draft (Strelci 40+, Legionáři 50+).</p></div>`;

  /* --- 3. Sapper recommendations: top 3 KPE per company --- */
  const sapperHtml = COMPANIES.map(c=>{
    const top3 = all.filter(m=>m.companyId===c.id && m.kpe>0).sort((a,b)=>b.kpe-a.kpe).slice(0,3);
    return `
      <div class="platoon-block ${THEME_BY_ID[c.id]||''}">
        <h3 class="platoon-title">${c.label}</h3>
        ${top3.length ? miniLedger(
          [{label:'Name'},{label:'KPE',num:true}],
          top3.map(m=>`<tr><td class="name-cell">${nameLink(m.name)}</td><td class="num">${m.kpe}</td></tr>`).join('')
        ) : `<div class="placeholder"><p>No KPE data yet for this company.</p></div>`}
      </div>
    `;
  }).join('');

  /* --- 4. Drummer recommendations: most events per company --- */
  const drummerRows = COMPANIES.map(c=>{
    const pool = all.filter(m=>m.companyId===c.id);
    if(!pool.length) return null;
    const top = pool.reduce((a,b)=> b.events > a.events ? b : a);
    return {c, top};
  }).filter(Boolean);

  const drummerHtml = miniLedger(
    [{label:'Company'},{label:'Name'},{label:'Total Events',num:true}],
    drummerRows.map(({c,top})=>`
      <tr>
        <td>${c.label}</td>
        <td class="name-cell">${nameLink(top.name)}</td>
        <td class="num">${top.events}</td>
      </tr>
    `).join('')
  );

  /* --- 5. Recruitment promotions due (RC points, separate ladder) --- */
  const rcPromoRows = RECRUITMENT_ROSTER
    .map(r => {
      const curIdx = rcLadderIndex(r.rank);
      if(curIdx === -1) return null;
      const eligIdx = rcEligibleIndex(r.totalPoints);
      if(eligIdx <= curIdx) return null;
      return {r, recommended: RC_RANK_LADDER[eligIdx].name};
    })
    .filter(Boolean)
    .sort((a,b)=>b.r.totalPoints-a.r.totalPoints);

  const rcPromoHtml = rcPromoRows.length ? miniLedger(
    [{label:'Name'},{label:'Company'},{label:'Current Rank'},{label:'Recommended'},{label:'RC Points',num:true}],
    rcPromoRows.map(({r,recommended})=>`
      <tr>
        <td class="name-cell">${nameLink(r.name)}</td>
        <td>${r.company||'—'}</td>
        <td>${r.rank}</td>
        <td class="kdr-good">${recommended}</td>
        <td class="num">${r.totalPoints}</td>
      </tr>
    `).join('')
  ) : `<div class="placeholder"><p>Nobody has enough RC points for a recruitment promotion right now.</p></div>`;

  /* --- 6. Recruitment medals earned --- */
  const medalRows = RECRUITMENT_ROSTER
    .map(r => ({r, medal: highestEligibleMedal(r.totalPoints)}))
    .filter(x => x.medal)
    .sort((a,b)=>b.r.totalPoints-a.r.totalPoints);

  const medalHtml = medalRows.length ? miniLedger(
    [{label:'Name'},{label:'Company'},{label:'Medal'},{label:'RC Points',num:true}],
    medalRows.map(({r,medal})=>`
      <tr>
        <td class="name-cell">${nameLink(r.name)}</td>
        <td>${r.company||'—'}</td>
        <td class="kdr-good">${medal.name}</td>
        <td class="num">${r.totalPoints}</td>
      </tr>
    `).join('')
  ) : `<div class="placeholder"><p>Nobody has cleared the 40 RC point bar for a medal yet.</p></div>`;

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = 'panel-recommendations';
  panel.innerHTML = `
    <div class="panel-header"><h2>Recommendations</h2><div class="meta">Auto-generated from current roster data</div></div>

    <div class="platoon-block">
      <h3 class="platoon-title">Promotions Due</h3>
      ${promoHtml}
    </div>

    <div class="platoon-block">
      <h3 class="platoon-title">Recruitment Promotions Due <span style="font-weight:400;text-transform:none;letter-spacing:0;">— RC points ladder</span></h3>
      ${rcPromoHtml}
    </div>

    <div class="platoon-block">
      <h3 class="platoon-title">Recruitment Medals <span style="font-weight:400;text-transform:none;letter-spacing:0;">— Bronze 40 / Silver 80 / Gold 120 RC</span></h3>
      ${medalHtml}
    </div>

    <div class="platoon-block">
      <h3 class="platoon-title">Draft Recommendations</h3>
      ${draftHtml}
    </div>

    <div class="platoon-block">
      <h3 class="platoon-title">Sapper Recommendations <span style="font-weight:400;text-transform:none;letter-spacing:0;">— top 3 KPE per company</span></h3>
      ${sapperHtml}
    </div>

    <div class="platoon-block">
      <h3 class="platoon-title">Drummer Recommendations <span style="font-weight:400;text-transform:none;letter-spacing:0;">— most events per company</span></h3>
      ${drummerHtml}
    </div>
  `;
  document.getElementById('main').appendChild(panel);
}

    <div id="depot-sections"></div>
  `;
  document.getElementById('main').appendChild(panel);

  const container = panel.querySelector('#depot-sections');
  DEPOT_ORDER.forEach(section=>{
    const recruits = DEPOT[section];
    if(!recruits) return;
    const block = document.createElement('div');
    block.className = 'platoon-block';
    block.innerHTML = `
      <h3 class="platoon-title">${section}</h3>
      <div class="ledger-wrap">
        <table class="ledger">
          <thead>
            <tr>
              <th>Rank</th><th>Name</th><th>Join Date</th>
              <th class="num">K</th><th class="num">D</th><th class="num">KDR</th>
              <th class="num">KPE</th><th class="num">Activity</th>
              <th class="num">Events</th><th>Returned</th><th>DM'd</th>
            </tr>
          </thead>
          <tbody>
            ${recruits.map(r=>`
              <tr>
                <td>${r.rank||'—'}</td>
                <td class="name-cell">${r.name}</td>
                <td>${r.joinDate||'—'}</td>
                <td class="num">${r.kills}</td>
                <td class="num">${r.deaths}</td>
                <td class="num ${kdrClass(r.kdr)}">${r.kdr.toFixed(2)}</td>
                <td class="num">${r.kpe}</td>
                <td class="num">${fmtPct(r.activity)}</td>
                <td class="num">${r.daysAttended}</td>
                <td>${r.returned ? '<span class="pos-tag staff-tag">Yes</span>' : '<span class="pos-tag">No</span>'}</td>
                <td>${r.dmd ? '<span class="pos-tag staff-tag">Yes</span>' : '<span class="pos-tag">No</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
    container.appendChild(block);
  });
}

function renderResultsPanel(){
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = 'panel-results';
  panel.innerHTML = `
    <div class="panel-header"><h2>Battle Results</h2></div>
  `;
  const sampleTag = document.createElement('div');
  sampleTag.className = 'sample-tag';
  sampleTag.textContent = 'Sample data — layout preview only, real results sheet not connected yet';
  panel.appendChild(sampleTag);
  BATTLES.forEach(b => panel.appendChild(renderBattleCard(b)));
  document.getElementById('main').appendChild(panel);
}

/* ============ BOOTSTRAP ============ */
async function boot(){
  try{
    const data = await loadAllData(SHEET_URLS);
    COMPANIES = data.companies;
    HIGH_COMMAND = data.highCommand;
    RECRUITMENT = data.recruitment;
    DEPOT = data.depot;
  } catch(err){
    console.error('Failed to load live data, falling back to empty state:', err);
    COMPANIES = []; HIGH_COMMAND = {}; RECRUITMENT = {dailyGoal:0,totalRecruits:0,totalRobux:0,totalSessionsHosted:0,recruiters:[],staff:[],sessions:[]}; DEPOT = {};
    document.getElementById('load-error').style.display = 'block';
  }
  buildMemberIndex();
  buildRecruitmentIndexes();
  buildNav();

  renderIndividualPanel();
  renderProfilePanel();
  renderCommandPanel();
  COMPANIES.forEach(renderCompanyPanel);
  renderDepotPanel();
  renderRecruitmentPanel();
  renderRecommendationsPanel();
  renderResultsPanel();

  document.getElementById('dateline').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'});
  document.getElementById('loading-screen').style.display = 'none';
}
boot();
</script>
</body>
</html>
